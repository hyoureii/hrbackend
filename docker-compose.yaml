services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hrconnect
      POSTGRES_PASSWORD: hrbackenddb
      POSTGRES_DB: auth
    ports:
      - "9002:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hrbackend

networks:
  hrbackend:
