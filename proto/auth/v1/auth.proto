syntax = "proto3";
package auth.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";

option go_package = "github.com/hyoureii/hrbackend/gen/auth/v1;auth";

message LoginRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string password = 2 [(buf.validate.field).string.min_len = 8];
}
message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 exp_time = 3;
}

message RefreshRequest {
  string refresh_token = 1 [(buf.validate.field).required = true];
}
message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 exp_time = 3;
}

message LogoutRequest {}
message LogoutResponse {}

message ChangePasswordRequest {
  string old_password = 1 [(buf.validate.field).string.min_len = 8];
  string new_password = 2 [(buf.validate.field).string.min_len = 8];
}
message ChangePasswordResponse {}

message ResetPasswordRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string new_password = 2 [(buf.validate.field).string.min_len = 8];
}
message ResetPasswordResponse {}

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/auth/login"
      body: "*"
    };
  }

  rpc Refresh(RefreshRequest) returns (RefreshResponse) {
    option (google.api.http) = {
      post: "/auth/refresh"
      body: "*"
    };
  }

  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {post: "/auth/logout"};
  }

  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse) {
    option (google.api.http) = {
      post: "/auth/change"
      body: "*"
    };
  }

  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse) {
    option (google.api.http) = {
      post: "/auth/reset"
      body: "*"
    };
  }
}
