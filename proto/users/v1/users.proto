syntax = "proto3";
package users.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";

option go_package = "github.com/hyoureii/hrbackend/gen/users/v1;users";

message User {
  message Data {
    string email = 1 [(buf.validate.field).string.email = true];
    string first_name = 2 [(buf.validate.field).required = true];
    string last_name = 3 [(buf.validate.field).required = true];
    string role = 4 [(buf.validate.field).required = true];
    optional string avatar_url = 5 [(buf.validate.field).string.uri = true];
  }
  string id = 1;
  Data data = 2;
  bool is_active = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
}

message RegisterRequest {
  User.Data data = 1;
  string password = 2 [(buf.validate.field).string.min_len = 8];
}
message RegisterResponse {}

message GetAllUsersRequest {}
message GetAllUsersResponse {
  repeated User user = 1;
}

message GetUserByIdRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}
message GetUserByIdResponse {
  User user = 1;
}

message UpdateRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  User.Data data = 2;
}
message UpdateResponse {}

message DeleteRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}
message DeleteResponse {}

message MeRequest {}
message MeResponse {
  User user = 1;
}

message DeactivateRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}
message DeactivateResponse {}

message ActivateRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}
message ActivateResponse {}

service UsersService {
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/users/register"
      body: "*"
    };
  }

  rpc GetAllUsers(GetAllUsersRequest) returns (GetAllUsersResponse) {
    option (google.api.http) = {get: "/users"};
  }

  rpc GetUserById(GetUserByIdRequest) returns (GetUserByIdResponse) {
    option (google.api.http) = {get: "/users/{id}"};
  }

  rpc Me(MeRequest) returns (MeResponse) {
    option (google.api.http) = {get: "/me"};
  }

  rpc Deactivate(DeactivateRequest) returns (DeactivateResponse) {
    option (google.api.http) = {
      post: "/users/{id}/deactivate"
      body: "*"
    };
  }

  rpc Activate(ActivateRequest) returns (ActivateResponse) {
    option (google.api.http) = {
      post: "/users/{id}/activate"
      body: "*"
    };
  }

  rpc Update(UpdateRequest) returns (UpdateResponse) {
    option (google.api.http) = {
      put: "/users/{id}"
      body: "*"
    };
  }

  rpc Delete(DeleteRequest) returns (DeleteResponse) {
    option (google.api.http) = {delete: "/users/{id}"};
  }
}
