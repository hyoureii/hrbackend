syntax = "proto3";
package users.v1;

import "google/api/annotations.proto";

option go_package = "github.com/hyoureii/hrbackend/gen/users/v1;users";

enum Role {
  ROLE_STAFF_UNSPECIFIED = 0;
  ROLE_ADMIN = 1;
  ROLE_DIRECTOR = 2;
  ROLE_MANAGER = 3;
  ROLE_SUPERVISOR = 4;
}

message User {
  message Data {
    string email = 1;
    string first_name = 2;
    string last_name = 3;
    Role role = 4;
    optional string avatar_url = 5;
  }
  string id = 1;
  Data data = 2;
  bool is_active = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
}
message RegisterRequest {
  User.Data data = 1;
  string password = 2;
}
message RegisterResponse {}
message GetAllUsersRequest {}
message GetAllUsersResponse {
  repeated User user = 1;
}
message GetUserByIdRequest {
  string id = 1;
}
message GetUserByIdResponse {
  User user = 1;
}
message UpdateRequest {
  string id = 1;
  User.Data data = 2;
}
message UpdateResponse {}
message DeleteRequest {
  string id = 1;
}
message DeleteResponse {}
message MeRequest {}
message MeResponse {
  User user = 1;
}
message DeactivateRequest {
  string id = 1;
}
message DeactivateResponse {}
message ActivateRequest {
  string id = 1;
}
message ActivateResponse {}

service UsersService {
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/users/register"
      body: "*"
    };
  }

  rpc GetAllUsers(GetAllUsersRequest) returns (GetAllUsersResponse) {
    option (google.api.http) = {get: "/users"};
  }

  rpc GetUserById(GetUserByIdRequest) returns (GetUserByIdResponse) {
    option (google.api.http) = {get: "/users/{id}"};
  }

  rpc Me(MeRequest) returns (MeResponse) {
    option (google.api.http) = {get: "/me"};
  }

  rpc Deactivate(DeactivateRequest) returns (DeactivateResponse) {
    option (google.api.http) = {
      post: "/users/{id}/deactivate"
      body: "*"
    };
  }

  rpc Activate(ActivateRequest) returns (ActivateResponse) {
    option (google.api.http) = {
      post: "/users/{id}/activate"
      body: "*"
    };
  }

  rpc Update(UpdateRequest) returns (UpdateResponse) {
    option (google.api.http) = {
      put: "/users/{id}"
      body: "*"
    };
  }

  rpc Delete(DeleteRequest) returns (DeleteResponse) {
    option (google.api.http) = {delete: "/users/{id}"};
  }
}
