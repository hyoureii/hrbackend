name: Deploy

on:
  workflow_run:
    workflows: [Build]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy compose, traefik and redis config file
        run: |
          scp -i ~/.ssh/id_ed25519 \
          docker-compose.prod.yaml \
          traefik.yaml \
          redis.conf \
          garage.toml \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/app/

      - name: Pull image & restart container
        run: |
          ssh -i ~/.ssh/id_ed25519 \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
          'cd /app && \
          docker compose -f docker-compose.prod.yaml pull && \
          docker compose -f docker-compose.prod.yaml up -d --remove-orphans'

      # - name: Run migrations and seed
      #   run: |
      #     ssh -i ~/.ssh/id_ed25519 \
      #     ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
      #     'cd /app && \
      #     docker compose -f docker-compose.prod.yaml exec -T app /migrate push && \
      #     docker compose -f docker-compose.prod.yaml exec -T app /seed'
