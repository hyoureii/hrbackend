services:
  traefik:
    image: traefik:v3.7
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CLOUDFLARE_DNS_API_TOKEN: ${CLOUDFLARE_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./data/certs:/var/traefik/certs/:rw
    networks:
      - hrbackend

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DBNAME}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - hrbackend

  redis:
    image: redis:8.6-alpine
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - ./users.acl:/usr/local/etc/redis/users.acl
      - ./data/redis:/data
    networks:
      - hrbackend

  s3:
    image: dxflrs/garage:v2.3.0
    restart: unless-stopped
    command: /garage server --single-node --default-bucket
    environment:
      GARAGE_DEFAULT_SECRET_KEY: ${GARAGE_S3_SECRET}
      GARAGE_DEFAULT_ACCESS_KEY: ${GARAGE_S3_ACCESS}
      GARAGE_DEFAULT_BUCKET: ${GARAGE_S3_BUCKET}
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
    volumes:
      - ./garage.toml:/etc/garage.toml
      - ./data/garage:/var/lib/garage
    networks:
      - hrbackend

  app:
    image: ghcr.io/hyoureii/hrbackend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    environment:
      GRPC_PORT: ${GRPC_PORT}
      HTTP_GATEWAY_PORT: ${HTTP_GATEWAY_PORT}
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DBNAME: ${POSTGRES_DBNAME}
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_USER: ${REDIS_USER}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: "6379"
      GARAGE_S3_HOST: s3
      GARAGE_S3_PORT: "3900"
      GARAGE_S3_SECRET: ${GARAGE_S3_SECRET}
      GARAGE_S3_ACCESS: ${GARAGE_S3_ACCESS}
      GARAGE_S3_BUCKET: ${GARAGE_S3_BUCKET}
      GARAGE_S3_REGION: ${GARAGE_S3_REGION}
      JWT_SECRET: ${JWT_SECRET}
    labels:
      - traefik.enable=true
      - traefik.http.routers.gateway-r.rule=Host(`hr.hyourei.xyz`) && (PathPrefix(`/api`) || PathPrefix(`/qr`))
      - traefik.http.routers.gateway-r.entrypoints=websecure
      - traefik.http.routers.gateway-r.service=gateway-s
      - traefik.http.routers.gateway-r.tls=true
      - traefik.http.routers.gateway-r.tls.certresolver=cloudflare
      - traefik.http.services.gateway-s.loadbalancer.server.port=${HTTP_GATEWAY_PORT}
      - traefik.http.routers.grpc-r.rule=Host(`hr.hyourei.xyz`) && Header(`Content-Type`, `application/grpc`)
      - traefik.http.routers.grpc-r.entrypoints=websecure
      - traefik.http.routers.grpc-r.service=grpc-s
      - traefik.http.routers.grpc-r.tls=true
      - traefik.http.routers.grpc-r.tls.certresolver=cloudflare
      - traefik.http.services.grpc-s.loadbalancer.server.port=${GRPC_PORT}
      - traefik.http.services.grpc-s.loadbalancer.server.scheme=h2c
    networks:
      - hrbackend

networks:
  hrbackend:
